<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ViceBD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🌴 ViceBangladesh 🌴</h1>
    <input type="text" id="cityInput" placeholder="Enter a city (e.g. Dhaka, Tokyo, Paris)" />
    <button onclick="getWeather()">Check Weather</button>
    <div id="weatherResult"></div>
    <button id="musicToggleBtn" onclick="toggleMusic()">🔊 Toggle Music</button>
    <input type="range" id="volumeSlider" min="0" max="100" value="50" oninput="setVolume(this.value)" />
  </div>


  <audio id="bgMusic" autoplay loop muted>
    <source src="GTAVC.mp3" type="audio/mpeg" />
    Your browser does not support the audio element.
  </audio>

  <script src="script.js"></script>
  <script>
    const bgMusic = document.getElementById('bgMusic');
    const musicToggleBtn = document.getElementById('musicToggleBtn');
    const volumeSlider = document.getElementById('volumeSlider');

    bgMusic.volume = 0.5;

    function toggleMusic() {
      if (bgMusic.muted) {
        bgMusic.muted = false;
        bgMusic.play();
        musicToggleBtn.textContent = '🔇 Mute Music';
      } else {
        bgMusic.muted = true;
        musicToggleBtn.textContent = '🔊 Play Music';
      }
    }

    function setVolume(value) {
      bgMusic.volume = value / 100;
      bgMusic.muted = value === 0;
      musicToggleBtn.textContent = value === 0 ? '🔊 Play Music' : '🔇 Mute Music';
    }
  </script>
